name: ngame

services:
  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: ${API_PUBLIC_URL}
        VITE_REALTIME_URL: ${REALTIME_PUBLIC_URL}
    restart: unless-stopped
    ports:
      - "${PUBLISH_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-8080}:8080"
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
    command:
      - sh
      - -c
      - alembic upgrade head && exec uvicorn ngame_api.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    secrets:
      - jwt_private_key
      - jwt_public_key
    ports:
      - "${PUBLISH_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edge
      - data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5

  realtime:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
    secrets:
      - jwt_public_key
    ports:
      - "${PUBLISH_ADDRESS:-127.0.0.1}:${REALTIME_PORT:-2567}:2567"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
      - data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:2567/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    profiles: ["dev-mail"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - data

secrets:
  jwt_private_key:
    file: ./secrets/jwt-private.pem
  jwt_public_key:
    file: ./secrets/jwt-public.pem

volumes:
  postgres_data:
  redis_data:

networks:
  edge:
  data:
    internal: true
