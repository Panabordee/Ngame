# ~/.codex/config.toml (global) or .codex/config.toml (per-project)
# Adjust to taste — this is a reasonable starting point for feature-by-feature game dev work.

# Default profile for most tasks (fast, token-efficient)
[profiles.fast]
model = "gpt-5.1-codex-mini"
model_reasoning_effort = "low"

# Profile for hard tasks, e.g. designing the turn state machine or debugging a race condition
[profiles.deep]
model = "gpt-5.1-codex"
model_reasoning_effort = "high"

# Sandbox: start with workspace-write, safer than full-access
sandbox_mode = "workspace-write"

# Keep Codex scoped to the project folder only, not the whole filesystem.
# Use --add-dir at runtime if you need to reference another folder, e.g. shared assets.

# Example MCP server, e.g. connecting to Postgres for dev-data debugging (adjust the path for your machine)
# [mcp_servers.dev-db]
# command = "/usr/local/bin/postgres-mcp-server"
# env = { DB_URL = "postgresql://localhost:5432/cipherdeck" }
# timeout_secs = 30

# Notes:
# - Run `codex --print-instructions` to verify the merged AGENTS.md content before starting a long session.
# - Use /mcp inside a session to list connected MCP servers.
# - The model strings above reflect info available as of mid-2026 — double-check against
#   `codex --version` / current docs before relying on them, in case newer models have shipped.
